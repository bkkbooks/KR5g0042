front:
  text: 重陽立教十五論楹七
  hash: sha256:6cc00cf1169254416b7d534e8df3a7f498daa2d277523f994836d9d001ca72c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0042_HFL_000-001a, image: hfl/0989/0989-004.png}
body:
  text: 第一住庵凡出家者先須投庵庵者舍也一身依倚身有依倚心漸得安氣神和暢入眞道矣凡有動作不可過勞過勞則損氣不可不動不動則氣血凝滯須要動静得其中然後可以守常安分此是住安之法第二雲遊凡遊歷之道有二一者看山水明秀花木之紅翠或翫州府之繁華或賞寺觀之樓閣或尋朋友以縱意或爲衣食而留心如此之人雖行萬里之途勞形費力遍覽天下之景心亂氣衰此乃虚雲遊之人二者叅尋性命求問妙玄登巇嶮之高山訪明師之不惓渡喧轟之遠水問道無厭若一句相投便有圓光内發了生死之大事作全真之丈夫如此之人乃眞雲遊也第三學書學書之道不可尋文而亂目當宜採意以合心捨書探意採理捨理採趣採得趣則可以收之入心久久精誠自然心光洋溢智神踴躍無所不通無所不解若到此則可以收養不可馳騁耳恐失於性命若不窮書之本意只欲記多念廣人前談說誇訝才俊無益於修行有傷於神氣雖多看書與道何益既得書意可深藏之第四論合藥藥者乃山川之秀氣草木之精華一温一寒可補可泄一厚一薄可表可托肯精學者活人之性命若盲毉者損人之形體學道之人不可不通若不通者無以助道不可執著則有損於陰功外貪財貨内費修眞不足今生招愆切忌來生之報吾門高弟仔細叅詳第五論蓋造茅庵草舍須要遮形露宿野眠觸犯日月苟或雕梁峻字亦非上士之作爲大殿高堂豈是道人之活計斫伐樹木斷地脉之津液化道貨財取人家之血脉只修外功不修内行如畫餅充飢積雪爲糧虚勞衆力到了成空有志之人早當覓身中寳殿體外朱樓不解修完看看倒塌聦明君子細細察詳第六論合道伴道人合伴本欲疾病相扶你死我埋我死你埋然先擇人而後合伴不可先合伴而後擇人不可相戀相戀則繫其心不可不戀不戀則情相離戀欲不戀得其中道可矣有三合三不合明心有慧有志此三合也不明著外境無智慧性愚濁無志氣乾打鬨此三不合也立身之本在叢林全憑心志不可順人情下可取相貌唯擇高明者是上法也第七論打坐凡打坐者非言形體端然瞑目合眼此是假坐也眞坐者須要十二時辰住行坐卧一切動静中間心如泰山不動不摇把斷四門眼耳口鼻不令外景入内但有絲毫動静思念即不名静坐能如此者雖身處於塵世名已列於仙位不須遠叅他人便是身内賢聖百年功滿脫殻登真一粒丹成神遊八表第八論降心凡論心之道若常湛然其心不動昬昬默默不見萬物冥冥杳杳不内不外無絲毫念想此是定心不可降也若隨境生心顛顛倒倒尋頭覔尾此名亂心也速當剪除不可縱放敗壞道德損失性命住行坐卧常勤降聞見知覺爲病患矣第九論鍊性理性如調琴弦緊則有斷慢則不應緊慢得中琴可調矣則又如鑄劒剛多則折錫多則捲剛錫得中則劒可矣調鍊性者體此二法則自妙也第十論匹配五氣五氣聚於中宫三元攅於頂上青龍噴赤霧白虎吐烏煙萬神羅列百脉流沖丹砂晃朗鉛汞凝澄身且寄向人間神已遊於天上第十一論混性命性者神也命者氣也性若見命如禽得風飃飃輕舉省力易成陰符經云禽之制在氣是也修真之士不可不叅不可泄漏於下士恐有神明降責性命是修行之根本謹緊鍛鍊矣第十二論聖道入聖之道須是苦志多年積功累行高明之士賢達之流方可入聖之道也身居一室之中性滿乾坤普天聖衆默默護持無極仙君冥冥圍遶名集紫府位列仙階形且寄於塵中心已明於物外矣第十三論超三界欲界色界無色界此乃三界也心忘慮念即超欲界心忘諸境即超色界不著空見即超無色界離此三界神居仙聖之郷性在玉清之境矣第十四論養身之法法身者無形之相也不空不有無後無前不下不高非短非長用則無所不通藏之則昬默無跡若得此道正可養之養之多則功多養少則功少不可願歸不可戀世去住自然矣第十五論離凡世離凡世者非身離也言心地也身如藕根心似蓮花根在泥而花在虚空矣得道之人身在凡而心在聖境矣今之人欲永不死而離凡世者大愚不達道理也言十五論者警門中有志之人深可詳察知之重陽立教十五論終
